[mod-setting-description]
dr-territory-radius=Ownership radius of each demolisher territory in chunks. Vanilla = 4. Lower = more, smaller territories.
dr-tier-chunk-stride=Distance in chunks between tier thresholds. Vanilla = 18 (small→medium at 22.5 chunks, medium→big at 40.5 chunks). Increase to push stronger tiers further from the starting area.
dr-territory-voronoi-size=Geographic spacing of territory centres in tiles. Vanilla = 384. Increase to spread territories further apart on the map.
dr-small-hp-mult=HP multiplier applied to small demolisher max health. Vanilla base = 30 000.
dr-medium-hp-mult=HP multiplier applied to medium demolisher max health. Vanilla base = 100 000.
dr-big-hp-mult=HP multiplier applied to big demolisher max health. Vanilla base = 300 000.
dr-enrage-seconds=How long (seconds) a demolisher stays enraged after a building is placed in its territory.
dr-grace-period-min=Minutes after a territory becomes empty before it turns contested (yellow). 0 = instant.
dr-migration-delay-min=Minutes a contested territory must wait before a migrant worm is dispatched into it.
dr-migration-chance=Probability (0–1) that a migration is dispatched each time the interval rolls.
dr-migration-interval-min=How often (minutes) the game rolls for migration dispatches.
