[mod-name]
demolisher-rework=Demolisher Rework

[mod-description]
demolisher-rework=Smaller territories, migration-only repopulation, three-phase territory lifecycle, yellow minimap overlay for contested territories, build-trigger enrage.

[mod-setting-name]
dr-territory-radius=Territory radius (chunks)
dr-tier-chunk-stride=Tier stride (chunks)
dr-territory-voronoi-size=Territory Voronoi size (tiles)
dr-small-hp-mult=Small demolisher HP multiplier
dr-medium-hp-mult=Medium demolisher HP multiplier
dr-big-hp-mult=Big demolisher HP multiplier
dr-enrage-seconds=Enrage duration (seconds)
dr-grace-period-min=Grace period (minutes)
dr-migration-delay-min=Migration delay (minutes)
dr-migration-chance=Migration chance per roll
